<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Video Animation</title>
    <style>
        body {
            margin: 0;
            background-color: #eb9bc8;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial;
        }

        video {
            margin-top: 100px;
            width: 900px;
        }

</head>

<body>
    <h1>Rainy Day Animation</h1>

    <video controls autoplay loop playsinline>

    </video>
</body>

</html>
